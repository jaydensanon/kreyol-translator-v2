<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kreyòl ⇄ English Translator</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #334155;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f1f5f9;
        --panel: #ffffff;
        --panel-2: #f8fafc;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    header { text-align: center; margin-bottom: 20px; }
    h1 { margin: 0 0 4px; font-size: 1.6rem; }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .card {
      width: 100%;
      max-width: 720px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .direction {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .lang { color: var(--muted); }
    .lang.active { color: var(--text); }
    #swap {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      transition: transform 0.2s, background 0.2s;
    }
    #swap:hover { background: var(--accent); color: #fff; transform: rotate(180deg); }
    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      line-height: 1.5;
    }
    textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .row { display: flex; justify-content: space-between; align-items: center; margin: 8px 2px; }
    .counter { color: var(--muted); font-size: 0.8rem; }
    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      transition: background 0.2s;
    }
    button.primary:hover:not(:disabled) { background: var(--accent-hover); }
    button.primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .output-wrap { margin-top: 18px; position: relative; }
    .output {
      min-height: 100px;
      padding: 14px;
      border-radius: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .output.empty { color: var(--muted); }
    #copy {
      position: absolute; top: 10px; right: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      display: none;
    }
    #copy:hover { color: var(--text); }
    .error { color: #f87171; margin-top: 10px; font-size: 0.9rem; }
    .hint { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 14px; }
    footer { color: var(--muted); font-size: 0.8rem; margin-top: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>Kreyòl ⇄ English Translator</h1>
    <p>Powered by Claude</p>
  </header>

  <div class="card">
    <div class="direction">
      <span class="lang active" id="srcLabel">Haitian Kreyòl</span>
      <button id="swap" title="Swap direction">⇄</button>
      <span class="lang" id="tgtLabel">English</span>
    </div>

    <textarea id="input" placeholder="Tape tèks ou a la a… (Type your text here)"></textarea>
    <div class="row">
      <span class="counter"><span id="count">0</span> / 5000</span>
      <span class="counter">Ctrl/⌘ + Enter to translate</span>
    </div>

    <button class="primary" id="translate">Translate</button>
    <div class="error" id="error"></div>

    <div class="output-wrap">
      <button id="copy" title="Copy">Copy</button>
      <div class="output empty" id="output">Translation will appear here…</div>
    </div>
  </div>

  <footer>Built with the Anthropic API</footer>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const btn = document.getElementById('translate');
    const swap = document.getElementById('swap');
    const srcLabel = document.getElementById('srcLabel');
    const tgtLabel = document.getElementById('tgtLabel');
    const errorEl = document.getElementById('error');
    const count = document.getElementById('count');
    const copyBtn = document.getElementById('copy');

    let direction = 'ht2en'; // Haitian Kreyòl -> English

    input.addEventListener('input', () => { count.textContent = input.value.length; });

    swap.addEventListener('click', () => {
      direction = direction === 'ht2en' ? 'en2ht' : 'ht2en';
      const ht = 'Haitian Kreyòl', en = 'English';
      if (direction === 'ht2en') {
        srcLabel.textContent = ht; tgtLabel.textContent = en;
        input.placeholder = 'Tape tèks ou a la a… (Type your text here)';
      } else {
        srcLabel.textContent = en; tgtLabel.textContent = ht;
        input.placeholder = 'Type your text here…';
      }
    });

    async function translate() {
      const text = input.value.trim();
      errorEl.textContent = '';
      if (!text) { input.focus(); return; }

      btn.disabled = true;
      btn.textContent = 'Translating…';
      output.classList.add('empty');
      output.textContent = 'Translating…';
      copyBtn.style.display = 'none';

      try {
        const res = await fetch('/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, direction }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Translation failed.');
        output.classList.remove('empty');
        output.textContent = data.translation;
        copyBtn.style.display = 'block';
      } catch (err) {
        output.classList.add('empty');
        output.textContent = 'Translation will appear here…';
        errorEl.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Translate';
      }
    }

    btn.addEventListener('click', translate);
    input.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') translate();
    });

    copyBtn.addEventListener('click', async () => {
      await navigator.clipboard.writeText(output.textContent);
      copyBtn.textContent = 'Copied!';
      setTimeout(() => (copyBtn.textContent = 'Copy'), 1500);
    });
  </script>
</body>
</html>
